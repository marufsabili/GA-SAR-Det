# 📊 KEY DIFFERENCES FROM ORIGINAL CONFIG:
# =====================================================
# 
# Augmentation (Reduced for precision):
#   mosaic: 1.0 → 0.8
#   mixup: 0.2 → 0.1
#   copy_paste: 0.6 → 0.3
#   degrees: 30 → 15
#   translate: 0.1 → 0.05
#   scale: 0.5 → 0.3
#
# Loss Weights (Precision-focused):
#   box: 7.5 → 8.0
#   cls: 0.5 → 0.3
#   dfl: 1.5 → 1.8
#   bbox_loss_gain: 1.0 → 1.2
#
# Learning Rate (Finer tuning):
#   lr0: 0.01 → 0.008
#   lrf: 0.01 → 0.005
#   min_lr: 0.0001 → 0.00005
#
# Training Duration (Optimized for 300):
#   epochs: 300 (tetap)
#   close_mosaic: 30 → 40
#   patience: 50 → 80
#
# Assignment (Stricter):
#   tal_topk: 10 → 12
#   tal_alpha: 0.5 → 0.6
#   iou_t: 0.20 → 0.25
#
# =====================================================

